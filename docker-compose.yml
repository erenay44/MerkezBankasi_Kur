version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: currency_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: CurrencyDb
    ports:
      - "5432:5432"

  cache:
    image: redis:latest
    container_name: currency_redis
    ports:
      - "6379:6379"

  data-api:
    image: currency-data-api
    build:
      context: .
      dockerfile: Currency.DataApi/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=CurrencyDb;Username=postgres;Password=1234
    ports:
      - "5002:8080"
    depends_on:
      - db
    restart: on-failure

  business-api:
    image: currency-business-api
    build:
      context: .
      dockerfile: Currency.BusinessApi/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=CurrencyDb;Username=postgres;Password=1234
      - ConnectionStrings__RedisConnection=cache:6379
    ports:
      - "5001:8080"
    depends_on:
      - db
      - cache

  web:
    image: currency-web
    build:
      context: .
      dockerfile: Currency.Web/Dockerfile
    environment:
      - ApiSettings__BusinessApiUrl=http://localhost:5001/api/Exchange/
    ports:
      - "5000:8080"
    depends_on:
      - business-api